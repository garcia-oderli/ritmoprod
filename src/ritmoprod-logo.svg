<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 240" width="600" height="240">
  <defs>
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111111;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#555555;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dddddd;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="240" fill="url(#metalGrad)" rx="8"/>

  <!-- Grid lines -->
  <line x1="0" y1="60" x2="600" y2="60" stroke="#333" stroke-width="0.5" opacity="0.5"/>
  <line x1="0" y1="120" x2="600" y2="120" stroke="#333" stroke-width="0.5" opacity="0.5"/>
  <line x1="0" y1="180" x2="600" y2="180" stroke="#333" stroke-width="0.5" opacity="0.5"/>

  <!-- Icon area: bar chart + upward arrow -->
  <g transform="translate(30, 38)">
    <rect x="0"  y="108" width="20" height="42" fill="#444" rx="2"/>
    <rect x="26" y="78"  width="20" height="72" fill="#666" rx="2"/>
    <rect x="52" y="48"  width="20" height="102" fill="#888" rx="2"/>
    <rect x="78" y="18"  width="20" height="132" fill="#aaa" rx="2" filter="url(#glow)"/>

    <!-- Takt line -->
    <line x1="0" y1="54" x2="104" y2="54" stroke="#ccc" stroke-width="2" stroke-dasharray="5,4" opacity="0.7"/>

    <!-- Upward arrow -->
    <polygon points="88,5 100,24 76,24" fill="#ffffff" filter="url(#glow)"/>
  </g>

  <!-- Vertical divider -->
  <line x1="170" y1="28" x2="170" y2="212" stroke="#444" stroke-width="1.5"/>

  <!-- RITMO text -->
  <text x="192" y="132"
    font-family="'Courier New', monospace"
    font-size="80"
    font-weight="900"
    letter-spacing="4"
    fill="url(#arrowGrad)"
    filter="url(#glow)">RITMO</text>

  <!-- PROD text -->
  <text x="196" y="174"
    font-family="'Courier New', monospace"
    font-size="36"
    font-weight="400"
    letter-spacing="18"
    fill="#666666">PROD</text>

  <!-- Bottom tag line -->
  <text x="196" y="200"
    font-family="'Courier New', monospace"
    font-size="12"
    letter-spacing="4"
    fill="#444444">CONTROLE DE PRODUÇÃO</text>

  <!-- Corner marks -->
  <line x1="3" y1="3" x2="20" y2="3" stroke="#555" stroke-width="1.5"/>
  <line x1="3" y1="3" x2="3" y2="20" stroke="#555" stroke-width="1.5"/>
  <line x1="597" y1="3" x2="580" y2="3" stroke="#555" stroke-width="1.5"/>
  <line x1="597" y1="3" x2="597" y2="20" stroke="#555" stroke-width="1.5"/>
  <line x1="3" y1="237" x2="20" y2="237" stroke="#555" stroke-width="1.5"/>
  <line x1="3" y1="237" x2="3" y2="220" stroke="#555" stroke-width="1.5"/>
  <line x1="597" y1="237" x2="580" y2="237" stroke="#555" stroke-width="1.5"/>
  <line x1="597" y1="237" x2="597" y2="220" stroke="#555" stroke-width="1.5"/>
</svg>
