<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RitmoProd" />
    <meta name="theme-color" content="#1a1a2e" />
    <title>RitmoProd — Estudo de Tempos</title>
    <script>
      (function(){
        var svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" fill="%231a1a2e" rx="80"/><rect x="68" y="330" width="72" height="150" fill="%231e3a5f" rx="8"/><rect x="160" y="265" width="72" height="215" fill="%231d4ed8" rx="8" opacity=".85"/><rect x="252" y="188" width="72" height="292" fill="%232563eb" rx="8"/><rect x="344" y="112" width="72" height="368" fill="%233b82f6" rx="8"/><line x1="58" y1="244" x2="454" y2="244" stroke="%23f59e0b" stroke-width="8" stroke-dasharray="22,13"/><polygon points="380,52 422,112 338,112" fill="%23ffffff"/><text x="256" y="498" font-family="Courier New,monospace" font-size="30" font-weight="900" fill="%23334155" text-anchor="middle" letter-spacing="9">RITMOPROD</text></svg>';
        var dataUrl = 'data:image/svg+xml,' + svg;

        // Favicon
        var favicon = document.createElement('link');
        favicon.rel = 'icon'; favicon.type = 'image/svg+xml'; favicon.href = dataUrl;
        document.head.appendChild(favicon);

        // Apple touch icon (canvas PNG para iOS)
        var canvas = document.createElement('canvas');
        canvas.width = 512; canvas.height = 512;
        var img = new Image();
        img.onload = function(){
          var ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, 512, 512);
          var pngUrl = canvas.toDataURL('image/png');
          var apple = document.createElement('link');
          apple.rel = 'apple-touch-icon'; apple.href = pngUrl;
          document.head.appendChild(apple);
          // Manifest PWA
          var manifest = {
            name: 'RitmoProd — Estudo de Tempos',
            short_name: 'RitmoProd',
            start_url: './',
            display: 'standalone',
            background_color: '#1a1a2e',
            theme_color: '#1a1a2e',
            orientation: 'any',
            icons: [
              { src: pngUrl, sizes: '512x512', type: 'image/png', purpose: 'any maskable' }
            ]
          };
          var blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
          var mlink = document.createElement('link');
          mlink.rel = 'manifest'; mlink.href = URL.createObjectURL(blob);
          document.head.appendChild(mlink);
        };
        img.src = dataUrl;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
