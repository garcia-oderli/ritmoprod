name: Sync to painel-esteira

on:
  push:
    branches: [master]
    paths:
      - '*.html'
      - 'painel_vercel.json'
      - 'esteira_script.gs'
      - 'painel_home.html'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ritmoprod
        uses: actions/checkout@v4

      - name: Clone painel-esteira
        run: |
          git clone https://x-access-token:${{ secrets.PAINEL_ESTEIRA_TOKEN }}@github.com/p09728655-maker/painel-esteira.git target

      - name: Copy files to painel-esteira
        run: |
          cp app.html target/
          cp app.html target/index.html
          cp esteira_operador.html target/
          cp esteira_tv.html target/
          cp simulacoes.html target/
          cp programacao.html target/
          cp curva_abc.html target/
          cp pesos.html target/
          cp formulas.html target/
          cp painel_vercel.json target/vercel.json
          cp esteira_script.gs target/ 2>/dev/null || true

      - name: Commit and push painel-esteira
        run: |
          cd target
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -A
          git diff --staged --quiet && echo "Nada a sincronizar" || git commit -m "sync: atualização automática de garcia-oderli/ritmoprod"
          git push

      - name: Clone curva-abc
        run: |
          git clone https://x-access-token:${{ secrets.PAINEL_ESTEIRA_TOKEN }}@github.com/p09728655-maker/curva-abc.git target-curva-abc

      - name: Copy files to curva-abc
        run: |
          cp curva_abc.html target-curva-abc/index.html
          cat > target-curva-abc/vercel.json << 'EOF'
          {
            "routes": [
              { "src": "/(.*)", "dest": "/index.html" }
            ]
          }
          EOF

      - name: Commit and push curva-abc
        run: |
          cd target-curva-abc
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -A
          git diff --staged --quiet && echo "Nada a sincronizar (curva-abc)" || git commit -m "sync: atualização automática de garcia-oderli/ritmoprod"
          git push
