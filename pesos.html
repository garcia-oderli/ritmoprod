<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabela de Pesos — ritmoprod</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0A0A0B;
  --surface: #18181B;
  --border:  #3F3F46;
  --accent:  #FF5C1F;
  --ok:      #16A34A;
  --txt:     #FAFAFA;
  --txt2:    #71717A;
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg);
  color: var(--txt);
  font-family: 'Inter', system-ui, sans-serif;
  min-height: 100vh;
}

nav {
  background: var(--surface);
  border-bottom: 2px solid var(--accent);
  padding: 10px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}
.nav-brand { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: 1px; text-decoration: none; }
.nav-links { display: flex; gap: 6px; }
.nav-links a {
  color: var(--txt2); text-decoration: none; font-size: 13px;
  padding: 5px 10px; border-radius: 6px; transition: background .15s, color .15s;
}
.nav-links a:hover, .nav-links a.active { background: var(--border); color: var(--txt); }

.container { max-width: 900px; margin: 0 auto; padding: 24px 20px; }

.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 12px;
}
.page-header h2 { font-size: 22px; font-weight: 700; }

.btn {
  padding: 9px 18px; border-radius: 7px; border: none;
  font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: opacity .15s; white-space: nowrap;
}
.btn:hover { opacity: 0.85; }
.btn-accent  { background: var(--accent); color: #fff; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--txt2); }
.btn-outline:hover { border-color: var(--txt2); color: var(--txt); }

.stats-row {
  display: flex;
  gap: 16px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.stat-chip {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 16px;
  font-size: 13px;
  color: var(--txt2);
}
.stat-chip strong { color: var(--txt); font-size: 18px; display: block; margin-bottom: 2px; }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}

.tabela-pesos {
  width: 100%;
  border-collapse: collapse;
}
.tabela-pesos thead th {
  background: var(--bg);
  color: var(--txt2);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  text-align: left;
}
.tabela-pesos tbody td {
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
  vertical-align: middle;
}
.tabela-pesos tbody tr:last-child td { border-bottom: none; }
.tabela-pesos tbody tr:hover td { background: rgba(255,255,255,0.02); }
.td-codigo { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--txt2); width: 120px; }
.td-desc   { font-weight: 500; }
.td-pb     { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--ok); text-align: right; width: 100px; }
.td-pb-vazio { color: var(--txt2); text-align: right; font-style: italic; font-size: 12px; }
.td-ean    { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--txt2); width: 130px; }

#estado {
  text-align: center;
  padding: 40px;
  color: var(--txt2);
  font-size: 14px;
}

/* ── PRINT ── */
@media print {
  *, *::before, *::after {
    color: #000 !important;
    background: #fff !important;
    border-color: #ccc !important;
    box-shadow: none !important;
  }

  nav, .page-header .btn, #btn-imprimir { display: none !important; }
  #print-header { display: block !important; }

  body { background: #fff; font-family: 'Inter', Arial, sans-serif; }
  .container { max-width: 100%; padding: 0; margin: 0; }

  .page-header { margin-bottom: 12px; }
  .page-header h2 { font-size: 18px; font-weight: 700; }

  .stats-row { gap: 10px; margin-bottom: 12px; }
  .stat-chip {
    border: 1px solid #ccc !important;
    border-radius: 4px !important;
    padding: 6px 12px !important;
    font-size: 11px !important;
  }
  .stat-chip strong { font-size: 15px !important; }

  .card { border: 1px solid #bbb !important; border-radius: 0 !important; }

  .tabela-pesos thead th {
    background: #f0f0f0 !important;
    color: #444 !important;
    font-size: 10px;
    padding: 6px 10px;
    border-bottom: 2px solid #bbb !important;
  }
  .tabela-pesos tbody td {
    font-size: 12px;
    padding: 6px 10px;
    border-bottom: 1px solid #e8e8e8 !important;
  }
  .td-codigo { color: #555 !important; }
  .td-pb     { color: #000 !important; font-weight: 700; }
  .td-ean    { color: #888 !important; }

  #print-header {
    border-bottom: 2px solid #000 !important;
    padding-bottom: 10px;
    margin-bottom: 16px;
  }
}
</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="/">ritmoprod<span style="color:#FF5C1F">.</span></a>
  <div class="nav-links">
    <a href="/operador">Operador</a>
    <a href="/tv">TV</a>
    <a href="/simulacoes">Simulações</a>
    <a href="/programacao">Programação</a>
    <a href="/pesos" class="active">Pesos</a>
  </div>
</nav>

<!-- Cabeçalho só para impressão -->
<div id="print-header" style="display:none;font-family:'Inter',Arial,sans-serif;padding:0 0 10px">
  <div style="font-size:20px;font-weight:800;letter-spacing:1px">ritmoprod. — Tabela de Pesos (kg)</div>
  <div id="ph-data" style="margin-top:4px;font-size:12px;color:#555"></div>
</div>

<div class="container">

  <div class="page-header">
    <h2>Tabela de Pesos</h2>
    <div style="display:flex;gap:8px">
      <button class="btn btn-outline" onclick="carregar()">↻ Atualizar</button>
      <button class="btn btn-accent" id="btn-imprimir" onclick="imprimir()">🖨 Imprimir PDF</button>
    </div>
  </div>

  <div class="stats-row" id="stats-row" style="display:none">
    <div class="stat-chip"><strong id="stat-total">—</strong>Produtos</div>
    <div class="stat-chip"><strong id="stat-com-peso">—</strong>Com peso cadastrado</div>
    <div class="stat-chip"><strong id="stat-sem-peso">—</strong>Sem peso</div>
    <div class="stat-chip"><strong id="stat-min">—</strong>Menor peso (kg)</div>
    <div class="stat-chip"><strong id="stat-max">—</strong>Maior peso (kg)</div>
  </div>

  <div class="card">
    <div id="estado">Carregando produtos...</div>
    <table class="tabela-pesos" id="tabela" style="display:none">
      <thead>
        <tr>
          <th>Código</th>
          <th>Descrição</th>
          <th style="text-align:right">Peso Bruto (kg)</th>
          <th>EAN</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

</div>

<script>
const DEFAULT_APPS_URL = "https://script.google.com/macros/s/AKfycby3fhsaj-nfejzJLhCErjhpDERvr24-nokG-Cq_qwxnXXzIbwF8iFhvkfZm2Y6D168b/exec";
function getAppsScriptURL() {
  return localStorage.getItem('esteira_apps_url') || DEFAULT_APPS_URL;
}

async function carregar() {
  const estado = document.getElementById('estado');
  const tabela = document.getElementById('tabela');
  const statsRow = document.getElementById('stats-row');

  estado.textContent = 'Carregando...';
  estado.style.display = 'block';
  tabela.style.display = 'none';
  statsRow.style.display = 'none';

  try {
    const controller = new AbortController();
    setTimeout(() => controller.abort(), 12000);
    const res  = await fetch(`${getAppsScriptURL()}?acao=produtos`, { redirect: 'follow', signal: controller.signal });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error);

    const produtos = json.data || [];
    renderTabela(produtos);
  } catch (e) {
    estado.textContent = 'Erro ao carregar: ' + e.message;
  }
}

function renderTabela(produtos) {
  const estado   = document.getElementById('estado');
  const tabela   = document.getElementById('tabela');
  const tbody    = document.getElementById('tbody');
  const statsRow = document.getElementById('stats-row');

  tbody.innerHTML = '';

  if (produtos.length === 0) {
    estado.textContent = 'Nenhum produto encontrado.';
    return;
  }

  const comPeso  = produtos.filter(p => parseFloat(p.pb) > 0);
  const semPeso  = produtos.filter(p => !(parseFloat(p.pb) > 0));
  const pesos    = comPeso.map(p => parseFloat(p.pb));
  const minPeso  = pesos.length ? Math.min(...pesos) : 0;
  const maxPeso  = pesos.length ? Math.max(...pesos) : 0;

  document.getElementById('stat-total').textContent    = produtos.length;
  document.getElementById('stat-com-peso').textContent = comPeso.length;
  document.getElementById('stat-sem-peso').textContent = semPeso.length;
  document.getElementById('stat-min').textContent      = minPeso > 0 ? minPeso.toFixed(3) : '—';
  document.getElementById('stat-max').textContent      = maxPeso > 0 ? maxPeso.toFixed(3) : '—';
  statsRow.style.display = 'flex';

  // Ordena: com peso primeiro (por peso desc), depois sem peso
  const ordenados = [
    ...comPeso.sort((a,b) => parseFloat(b.pb) - parseFloat(a.pb)),
    ...semPeso
  ];

  ordenados.forEach(p => {
    const pb   = parseFloat(p.pb);
    const temPb = pb > 0;
    const tr   = document.createElement('tr');
    tr.innerHTML = `
      <td class="td-codigo">${p.codigo || '—'}</td>
      <td class="td-desc">${p.descricao || '—'}</td>
      <td class="${temPb ? 'td-pb' : 'td-pb-vazio'}">${temPb ? pb.toFixed(3) + ' kg' : 'não cadastrado'}</td>
      <td class="td-ean">${p.ean128 || '—'}</td>
    `;
    tbody.appendChild(tr);
  });

  estado.style.display = 'none';
  tabela.style.display  = 'table';
}

function imprimir() {
  const now = new Date();
  const data = now.toLocaleDateString('pt-BR') + ' às ' + now.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
  document.getElementById('ph-data').textContent = 'Emitido em: ' + data;
  window.print();
}

carregar();
</script>
</body>
</html>
